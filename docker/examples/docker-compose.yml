# Docker Compose for Qubic Bob (includes Redis and Kvrocks).
# Image: qubiccore/bob:latest
#
# Configuration can be done in two ways:
#   1. Environment variables (recommended).
#   2. Mount a custom bob.json file (see commented-out volume mount below).
#
# Env vars take precedence: the entrypoint patches bob.json / redis.conf /
# kvrocks.conf with them at startup.
#
# Full reference of all 39 supported environment variables:
#   docs/DOCKER_ENV.md  (https://github.com/qubic/core-bob/blob/master/docs/DOCKER_ENV.md)
#
# Most commonly tuned:
#   NODE_SEED              - 55-char lowercase a-z seed for node identity (REQUIRED for production)
#   NODE_ALIAS             - Display name for this node
#   P2P_NODES              - Comma-separated peer list (e.g. "BM:1.2.3.4:21841:0-0-0-0")
#   LOG_LEVEL              - trace | debug | info | warn | error | fatal
#   REDIS_MAXMEMORY        - KeyDB memory cap (default: 2gb)
#   KVROCKS_TTL            - Data retention in kvrocks, seconds (default: 1209600 = 14 days)

services:
  qubic-bob:
    image: qubiccore/bob:latest
    container_name: qubic-bob
    restart: unless-stopped
    ports:
      - "21842:21842"
      - "40420:40420"
    environment:
      - NODE_SEED=your_55_character_lowercase_seed_here_aaaaaaaaaaaa
      # - LOG_LEVEL=info
      # - P2P_NODES=1:1.2.3.4:21841,2:5.6.7.8:21841
      # - RUN_SERVER=true
      # - IS_TESTNET=false
    volumes:
      # - ./bob.json:/app/bob.json:ro # custom config file (env vars still override it)
      # - ./redis.conf:/etc/redis/redis.conf:ro # custom Redis config
      - qubic-bob-redis:/data/redis
      - qubic-bob-kvrocks:/data/kvrocks
      - qubic-bob-data:/data/bob

volumes:
  qubic-bob-redis:
    driver: local
  qubic-bob-kvrocks:
    driver: local
  qubic-bob-data:
    driver: local
